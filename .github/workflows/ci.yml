name: CI

# DEBUG MODE: trimmed to a single smoke-test job while we sort out GitLab auth
# for the nix flake fetch. The full matrix (pre-commit / check-fixme / 16-way
# pytest) is preserved in git history and will be restored once auth is green.
#
# Only `push` is wired up (not pull_request) to avoid firing two runs per push.

on:
  push:

jobs:
  auth-smoke-test:
    name: Auth smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write netrc for private GitLab flake inputs
        run: |
          umask 077
          printf 'machine gitlab.com\nlogin oauth2\npassword %s\n' \
            "${{ secrets.GITLAB_TOKEN }}" > "$HOME/.netrc"

      - name: Diagnose netrc presence
        run: |
          echo "whoami: $(whoami)"
          echo "HOME: $HOME"
          echo "--- ls -la \$HOME/.netrc ---"
          ls -la "$HOME/.netrc" || echo "MISSING: $HOME/.netrc"
          echo "--- netrc contents (password masked) ---"
          sed 's/^password .*/password ***MASKED***/' "$HOME/.netrc"
          echo "--- GITLAB_TOKEN secret present? ---"
          if [ -n "${{ secrets.GITLAB_TOKEN }}" ]; then
            echo "GITLAB_TOKEN is set (non-empty)"
          else
            echo "GITLAB_TOKEN is EMPTY — secret missing or not exposed"
          fi

      - name: Test raw git auth via netrc (no nix involved)
        run: |
          echo "Attempting git ls-remote using ~/.netrc ..."
          if git ls-remote https://gitlab.com/aion-physics/code/artiq/drivers/andor_windows_ndsp.git HEAD; then
            echo "RAW GIT AUTH: success — git reads ~/.netrc in this environment"
          else
            echo "RAW GIT AUTH: FAILED — git did not authenticate via ~/.netrc"
            exit 1
          fi

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Show nix netrc-related config
        run: |
          echo "--- /etc/nix/nix.conf ---"
          cat /etc/nix/nix.conf || true
          echo "--- nix show-config | grep -i netrc ---"
          nix show-config 2>/dev/null | grep -i netrc || true

      - name: Test nix flake eval (builds the env / triggers the gitlab fetch)
        run: nix develop -c true
