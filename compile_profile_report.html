<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            ARTIQ Compilation Profile — LMTInterferometrySymmetricFrag
        </title>
        <script
            src="https://unpkg.com/react@18/umd/react.production.min.js"
            crossorigin
        ></script>
        <script
            src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
            crossorigin
        ></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
        <style>
            :root {
                --bg: #0d1117;
                --bg-elev: #161b22;
                --bg-elev2: #21262d;
                --border: #30363d;
                --text: #c9d1d9;
                --text-dim: #8b949e;
                --accent: #58a6ff;
                --accent2: #3fb950;
                --warn: #d29922;
                --danger: #f85149;
                --code-bg: #1e2530;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 2rem;
            }
            h1 {
                font-size: 1.8rem;
                font-weight: 600;
                margin-bottom: 0.3rem;
                color: #f0f6fc;
            }
            .subtitle {
                color: var(--text-dim);
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 1rem;
                margin-bottom: 2rem;
            }
            .stat-card {
                background: var(--bg-elev);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.2rem;
                text-align: center;
            }
            .stat-value {
                font-size: 2rem;
                font-weight: 700;
                color: var(--accent);
                font-variant-numeric: tabular-nums;
            }
            .stat-value.warn {
                color: var(--warn);
            }
            .stat-value.danger {
                color: var(--danger);
            }
            .stat-label {
                font-size: 0.85rem;
                color: var(--text-dim);
                margin-top: 0.3rem;
            }
            .section {
                background: var(--bg-elev);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }
            .section h2 {
                margin: 0 0 1rem 0;
                font-size: 1.2rem;
                font-weight: 600;
                color: #f0f6fc;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .section h3 {
                margin: 1.5rem 0 0.75rem 0;
                font-size: 1rem;
                color: var(--accent);
            }
            .chart-container {
                width: 100%;
                min-height: 380px;
            }
            .two-col {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1.5rem;
            }
            @media (max-width: 800px) {
                .two-col {
                    grid-template-columns: 1fr;
                }
            }
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.9rem;
                margin-top: 0.5rem;
            }
            th,
            td {
                text-align: left;
                padding: 0.6rem 0.8rem;
                border-bottom: 1px solid var(--border);
            }
            th {
                color: var(--text-dim);
                font-weight: 500;
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.03em;
            }
            tr:hover td {
                background: var(--bg-elev2);
            }
            td.num {
                font-variant-numeric: tabular-nums;
                text-align: right;
            }
            code {
                font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
                font-size: 0.85em;
                background: var(--code-bg);
                padding: 0.15rem 0.4rem;
                border-radius: 4px;
                color: #e6edf3;
            }
            .code-block {
                background: var(--code-bg);
                border-radius: 6px;
                padding: 1rem;
                overflow-x: auto;
                font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
                font-size: 0.85rem;
                line-height: 1.5;
                margin: 0.75rem 0;
            }
            .code-block .comment {
                color: #8b949e;
            }
            .code-block .keyword {
                color: #ff7b72;
            }
            .code-block .string {
                color: #a5d6ff;
            }
            .code-block .func {
                color: #d2a8ff;
            }
            .recommendation {
                background: var(--bg-elev2);
                border-left: 3px solid var(--accent);
                padding: 1rem 1.2rem;
                border-radius: 0 6px 6px 0;
                margin: 0.75rem 0;
            }
            .recommendation h4 {
                margin: 0 0 0.4rem 0;
                font-size: 0.95rem;
                color: var(--accent);
            }
            .recommendation p {
                margin: 0;
                font-size: 0.9rem;
                color: var(--text-dim);
            }
            .badge {
                display: inline-block;
                padding: 0.15rem 0.5rem;
                border-radius: 12px;
                font-size: 0.75rem;
                font-weight: 600;
                margin-left: 0.5rem;
            }
            .badge-hot {
                background: rgba(248, 81, 73, 0.2);
                color: var(--danger);
            }
            .badge-warm {
                background: rgba(210, 153, 34, 0.2);
                color: var(--warn);
            }
            .badge-cool {
                background: rgba(88, 166, 255, 0.2);
                color: var(--accent);
            }
            .highlight-box {
                background: rgba(248, 81, 73, 0.08);
                border: 1px solid rgba(248, 81, 73, 0.3);
                border-radius: 6px;
                padding: 1rem;
                margin: 1rem 0;
            }
            .highlight-box p {
                margin: 0;
                color: #f0f6fc;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { useState, useEffect, useRef } = React;

            // Data from profiling
            const OVERALL_STATS = [
                { label: "Total Time", value: "117 s", variant: "danger" },
                { label: "Function Calls", value: "140.7 M", variant: "warn" },
                {
                    label: "Fixed-Point Iterations",
                    value: "42",
                    variant: "danger",
                },
                { label: "Attrs Discovered", value: "3,220", variant: "warn" },
                { label: "Embedded Functions", value: "1,077", variant: "" },
                { label: "Kernels Precompiled", value: "3", variant: "" },
            ];

            const ITERATION_DATA = [
                { kernel: "device_setup", lmt: 17, simple: null, attrs: 2267 },
                { kernel: "run_once", lmt: 13, simple: null, attrs: 858 },
                { kernel: "device_cleanup", lmt: 12, simple: null, attrs: 95 },
                { kernel: "simple kernel", lmt: null, simple: 3, attrs: 2 },
            ];

            const HOTSPOTS_CUMTIME = [
                {
                    func: "algorithm._visit_one",
                    file: "pythonparser",
                    time: 68.5,
                    calls: "2.4M",
                },
                {
                    func: "algorithm.generic_visit",
                    file: "pythonparser",
                    time: 65.3,
                    calls: "2.1M",
                },
                {
                    func: "algorithm.visit",
                    file: "pythonparser",
                    time: 63.6,
                    calls: "4.7M",
                },
                {
                    func: "inferencer.visit_FunctionDefT",
                    file: "artiq/compiler",
                    time: 55.7,
                    calls: "11,763",
                },
                {
                    func: "inferencer.visit_CallT",
                    file: "artiq/compiler",
                    time: 47.4,
                    calls: "58,301",
                },
                {
                    func: "inferencer.visit_BinOpT",
                    file: "artiq/compiler",
                    time: 25.6,
                    calls: "166,932",
                },
                {
                    func: "embedding._unify_attribute",
                    file: "artiq/compiler",
                    time: 22.0,
                    calls: "82,603",
                },
                {
                    func: "inferencer.visit_CoerceT",
                    file: "artiq/compiler",
                    time: 23.8,
                    calls: "476,475",
                },
                {
                    func: "embedding._compute_attr_type",
                    file: "artiq/compiler",
                    time: 14.5,
                    calls: "10,238",
                },
                {
                    func: "embedding._quote",
                    file: "artiq/compiler",
                    time: 14.0,
                    calls: "10,130",
                },
                {
                    func: "inferencer._coerce_binop",
                    file: "artiq/compiler",
                    time: 11.1,
                    calls: "168,388",
                },
                {
                    func: "llvm_ir_generator.llty_of_type",
                    file: "artiq/compiler",
                    time: 8.3,
                    calls: "133,424",
                },
                {
                    func: "inferencer._coerce_numeric",
                    file: "artiq/compiler",
                    time: 8.6,
                    calls: "170,058",
                },
                {
                    func: "llvmlite FFI calls",
                    file: "llvmlite",
                    time: 9.1,
                    calls: "5,453",
                },
            ];

            const HOTSPOTS_TOTTIME = [
                {
                    func: "ffi.__call__",
                    file: "llvmlite",
                    time: 9.1,
                    calls: "5,453",
                },
                {
                    func: "builtins.isinstance",
                    file: "python",
                    time: 4.8,
                    calls: "28.9M",
                },
                {
                    func: "embedding._unify_attribute",
                    file: "artiq/compiler",
                    time: 4.0,
                    calls: "82,603",
                },
                {
                    func: "algorithm.visit",
                    file: "pythonparser",
                    time: 3.7,
                    calls: "4.7M",
                },
                {
                    func: "algorithm.generic_visit",
                    file: "pythonparser",
                    time: 3.7,
                    calls: "2.1M",
                },
                {
                    func: "algorithm._visit_one",
                    file: "pythonparser",
                    time: 3.0,
                    calls: "2.4M",
                },
                {
                    func: "types.find",
                    file: "artiq/compiler",
                    time: 2.5,
                    calls: "5.4M",
                },
                {
                    func: "types.is_mono",
                    file: "artiq/compiler",
                    time: 2.2,
                    calls: "2.7M",
                },
                {
                    func: "llvm_ir_generator.listcomp",
                    file: "artiq/compiler",
                    time: 2.0,
                    calls: "13,044",
                },
                {
                    func: "llvm_ir_generator.llty_of_type",
                    file: "artiq/compiler",
                    time: 2.0,
                    calls: "133,424",
                },
            ];

            const TOP_EXCLUSIVE = [
                { func: "llvmlite FFI calls", module: "llvmlite", time: 9.1 },
                { func: "isinstance", module: "builtins", time: 4.8 },
                { func: "_unify_attribute", module: "embedding", time: 4.0 },
                { func: "visit (parser)", module: "pythonparser", time: 3.7 },
                { func: "generic_visit", module: "pythonparser", time: 3.7 },
                { func: "_visit_one", module: "pythonparser", time: 3.0 },
                { func: "types.find", module: "artiq/types", time: 2.5 },
                { func: "types.is_mono", module: "artiq/types", time: 2.2 },
                { func: "llty listcomp", module: "llvm_ir_gen", time: 2.0 },
                { func: "llty_of_type", module: "llvm_ir_gen", time: 2.0 },
            ];

            function PlotlyChart({ data, layout, config }) {
                const ref = useRef(null);
                useEffect(() => {
                    if (ref.current) {
                        Plotly.newPlot(ref.current, data, layout, config);
                    }
                }, [data, layout, config]);
                return (
                    <div ref={ref} style={{ width: "100%", height: "100%" }} />
                );
            }

            function StatCard({ label, value, variant }) {
                return (
                    <div className="stat-card">
                        <div className={`stat-value ${variant}`}>{value}</div>
                        <div className="stat-label">{label}</div>
                    </div>
                );
            }

            function Section({ title, children, icon }) {
                return (
                    <div className="section">
                        <h2>
                            {icon} {title}
                        </h2>
                        {children}
                    </div>
                );
            }

            function App() {
                const commonLayout = {
                    paper_bgcolor: "rgba(0,0,0,0)",
                    plot_bgcolor: "rgba(0,0,0,0)",
                    font: {
                        color: "#c9d1d9",
                        family: "-apple-system, sans-serif",
                    },
                    margin: { t: 40, r: 20, b: 60, l: 60 },
                };

                const pieData = [
                    {
                        y: TOP_EXCLUSIVE.map((d) => d.func).reverse(),
                        x: TOP_EXCLUSIVE.map((d) => d.time).reverse(),
                        type: "bar",
                        orientation: "h",
                        marker: {
                            color: TOP_EXCLUSIVE.map((_, i) =>
                                i < 3
                                    ? "#f85149"
                                    : i < 6
                                      ? "#d29922"
                                      : "#58a6ff",
                            ).reverse(),
                        },
                        text: TOP_EXCLUSIVE.map((d) => d.time + "s").reverse(),
                        textposition: "outside",
                        hovertemplate:
                            "<b>%{y}</b><br>total: %{x:.1f}s<extra></extra>",
                    },
                ];

                const pieLayout = {
                    ...commonLayout,
                    xaxis: {
                        title: {
                            text: "Exclusive time (s)",
                            font: { color: "#8b949e" },
                        },
                        gridcolor: "#30363d",
                        zerolinecolor: "#30363d",
                        tickfont: { color: "#8b949e" },
                    },
                    yaxis: {
                        tickfont: { size: 11, color: "#c9d1d9" },
                        gridcolor: "#30363d",
                        automargin: true,
                    },
                    margin: { t: 20, r: 60, b: 50, l: 140 },
                };

                const barData = [
                    {
                        x: HOTSPOTS_CUMTIME.slice(0, 10).map((d) => d.func),
                        y: HOTSPOTS_CUMTIME.slice(0, 10).map((d) => d.time),
                        type: "bar",
                        marker: {
                            color: HOTSPOTS_CUMTIME.slice(0, 10).map((_, i) =>
                                i < 3
                                    ? "#f85149"
                                    : i < 6
                                      ? "#d29922"
                                      : "#58a6ff",
                            ),
                        },
                        text: HOTSPOTS_CUMTIME.slice(0, 10).map(
                            (d) => d.time + "s",
                        ),
                        textposition: "outside",
                        hovertemplate:
                            "<b>%{x}</b><br>cumulative: %{y:.1f}s<extra></extra>",
                    },
                ];

                const barLayout = {
                    ...commonLayout,
                    xaxis: {
                        tickangle: -35,
                        tickfont: { size: 10, color: "#8b949e" },
                        gridcolor: "#30363d",
                    },
                    yaxis: {
                        title: {
                            text: "Cumulative time (s)",
                            font: { color: "#8b949e" },
                        },
                        gridcolor: "#30363d",
                        zerolinecolor: "#30363d",
                    },
                };

                const iterData = [
                    {
                        x: [
                            "device_setup",
                            "run_once",
                            "device_cleanup",
                            "simple kernel",
                        ],
                        y: [17, 13, 12, 3],
                        type: "bar",
                        name: "Iterations",
                        marker: {
                            color: ["#f85149", "#f85149", "#f85149", "#3fb950"],
                        },
                        text: ["17", "13", "12", "3"],
                        textposition: "outside",
                    },
                    {
                        x: [
                            "device_setup",
                            "run_once",
                            "device_cleanup",
                            "simple kernel",
                        ],
                        y: [2267, 858, 95, 2],
                        type: "bar",
                        name: "Attributes",
                        yaxis: "y2",
                        marker: { color: "rgba(88,166,255,0.5)" },
                        text: ["2,267", "858", "95", "2"],
                        textposition: "outside",
                    },
                ];

                const iterLayout = {
                    ...commonLayout,
                    xaxis: {
                        tickfont: { color: "#8b949e" },
                        gridcolor: "#30363d",
                    },
                    yaxis: {
                        title: {
                            text: "Iterations",
                            font: { color: "#f85149" },
                        },
                        gridcolor: "#30363d",
                        zerolinecolor: "#30363d",
                        tickfont: { color: "#f85149" },
                    },
                    yaxis2: {
                        title: {
                            text: "Attributes discovered",
                            font: { color: "#58a6ff" },
                        },
                        overlaying: "y",
                        side: "right",
                        tickfont: { color: "#58a6ff" },
                        gridcolor: "#30363d",
                    },
                    legend: {
                        x: 0.02,
                        y: 0.98,
                        bgcolor: "rgba(0,0,0,0)",
                        font: { color: "#8b949e" },
                    },
                    barmode: "group",
                };

                return (
                    <div className="container">
                        <h1>ARTIQ Compilation Profile</h1>
                        <p className="subtitle">
                            <code>LMTInterferometrySymmetricFrag</code> — pytest{" "}
                            <code>-k LMTInterferometrySymmetricFrag</code>
                            <br />
                            Profiled via <code>cProfile</code> on 2026-06-05
                        </p>

                        <div className="stats-grid">
                            {OVERALL_STATS.map((s, i) => (
                                <StatCard key={i} {...s} />
                            ))}
                        </div>

                        <Section title="Executive Summary" icon="🎯">
                            <div className="highlight-box">
                                <p>
                                    The compiler spends <b>117 seconds</b> in a
                                    fixed-point type-inference loop that
                                    requires <b>42 iterations</b> across three
                                    kernels. Each iteration re-traverses the
                                    entire AST because embedded functions are
                                    discovered lazily — one batch at a time —
                                    forcing O(N²) work.
                                </p>
                            </div>
                            <p
                                style={{
                                    color: "#8b949e",
                                    fontSize: "0.95rem",
                                }}
                            >
                                For comparison, a trivial kernel (
                                <code>KernelExperiment</code>) with one
                                <code>@kernel</code> method compiles in under a
                                second and needs only
                                <b>3 iterations</b>.
                            </p>
                        </Section>

                        <div className="two-col">
                            <Section
                                title="Top Time Sinks (exclusive)"
                                icon="⏱️"
                            >
                                <div className="chart-container">
                                    <PlotlyChart
                                        data={pieData}
                                        layout={pieLayout}
                                        config={{
                                            responsive: true,
                                            displayModeBar: false,
                                        }}
                                    />
                                </div>
                            </Section>

                            <Section title="Fixed-Point Iterations" icon="🔄">
                                <div className="chart-container">
                                    <PlotlyChart
                                        data={iterData}
                                        layout={iterLayout}
                                        config={{
                                            responsive: true,
                                            displayModeBar: false,
                                        }}
                                    />
                                </div>
                                <p
                                    style={{
                                        fontSize: "0.85rem",
                                        color: "#8b949e",
                                        marginTop: "0.5rem",
                                    }}
                                >
                                    Red bars = iterations per kernel. Blue bars
                                    = host attributes discovered. The LMT
                                    fragment discovers <b>1,133×</b> more
                                    attributes than the simple kernel.
                                </p>
                            </Section>
                        </div>

                        <Section
                            title="Top Hotspots (by cumulative time)"
                            icon="🔥"
                        >
                            <div
                                className="chart-container"
                                style={{ minHeight: "320px" }}
                            >
                                <PlotlyChart
                                    data={barData}
                                    layout={barLayout}
                                    config={{
                                        responsive: true,
                                        displayModeBar: false,
                                    }}
                                />
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Function</th>
                                        <th>Module</th>
                                        <th className="num">Cum. time (s)</th>
                                        <th className="num">Calls</th>
                                        <th>Per call (ms)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {HOTSPOTS_CUMTIME.map((h, i) => (
                                        <tr key={i}>
                                            <td>
                                                <code>{h.func}</code>
                                            </td>
                                            <td>{h.file}</td>
                                            <td className="num">
                                                {h.time.toFixed(1)}
                                            </td>
                                            <td className="num">{h.calls}</td>
                                            <td className="num">
                                                {(
                                                    (h.time /
                                                        parseFloat(
                                                            h.calls.replace(
                                                                /,/g,
                                                                "",
                                                            ),
                                                        )) *
                                                    1000
                                                ).toFixed(3)}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </Section>

                        <Section
                            title="The Core Bottleneck: _compute_attr_type"
                            icon="🔍"
                        >
                            <p
                                style={{
                                    color: "#8b949e",
                                    fontSize: "0.95rem",
                                }}
                            >
                                Every attribute access on a host object (e.g.{" "}
                                <code>self.dds.frequency</code>) triggers{" "}
                                <code>
                                    StitchingInferencer._unify_attribute()
                                </code>
                                . If the attribute type is not in cache, it
                                takes the slow path:
                            </p>

                            <div className="code-block">
                                <span className="comment">
                                    # artiq/compiler/embedding.py:774-779
                                </span>
                                <br />
                                <span className="keyword">def</span>{" "}
                                <span className="func">_compute_attr_type</span>
                                (self, ...):
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;...
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;ast = self.
                                <span className="func">quote</span>(attr_value,
                                object_loc.expanded_from)
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;
                                <span className="func">Inferencer</span>
                                (engine=self.engine).visit(ast)
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;
                                <span className="func">IntMonomorphizer</span>
                                (engine=self.engine).visit(ast)
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;attr_value_type =
                                ast.type
                            </div>

                            <p
                                style={{
                                    color: "#8b949e",
                                    fontSize: "0.95rem",
                                }}
                            >
                                This quotes the attribute value as an AST and
                                runs a <b>full type-inference pass</b>
                                on it. The cache key is{" "}
                                <code>(id(object_value), attr_name)</code>, so
                                <b>
                                    different instances of the same class cause
                                    cache misses
                                </b>{" "}
                                even though their attribute types are identical.
                            </p>

                            <div className="highlight-box">
                                <p>
                                    <b>82,603</b> calls to{" "}
                                    <code>_unify_attribute</code> →
                                    <b> 10,238</b> cache misses → <b>10,130</b>{" "}
                                    slow-path quotes →<b>14.5 s</b> spent just
                                    inferring attribute types
                                </p>
                            </div>
                        </Section>

                        <Section
                            title="How the Fixed-Point Loop Works"
                            icon="♻️"
                        >
                            <p
                                style={{
                                    color: "#8b949e",
                                    fontSize: "0.95rem",
                                }}
                            >
                                In <code>Stitcher.finalize()</code> the compiler
                                iterates until convergence:
                            </p>

                            <div className="code-block">
                                <span className="keyword">while True</span>:
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;inferencer.visit(self.typedtree)&nbsp;&nbsp;
                                <span className="comment">
                                    # re-infer ALL functions
                                </span>
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;
                                <span className="keyword">if</span>{" "}
                                self.definitely_changed:
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;changed
                                = <span className="keyword">True</span>
                                &nbsp;&nbsp;
                                <span className="comment">
                                    # new func found → another pass
                                </span>
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.definitely_changed
                                = <span className="keyword">False</span>
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;
                                <span className="keyword">else</span>:<br />
                                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                                <span className="comment">
                                    # check hash + attr count
                                </span>
                                <br />
                                &nbsp;&nbsp;&nbsp;&nbsp;
                                <span className="keyword">
                                    if not
                                </span> changed:{" "}
                                <span className="keyword">break</span>
                            </div>

                            <p
                                style={{
                                    color: "#8b949e",
                                    fontSize: "0.95rem",
                                }}
                            >
                                Every time{" "}
                                <code>_quote_embedded_function()</code>{" "}
                                encounters a new kernel function, it sets{" "}
                                <code>definitely_changed = True</code>. The LMT
                                fragment's deep device hierarchy causes
                                functions to be discovered in small batches over
                                many iterations. Each iteration revisits{" "}
                                <b>all</b> previously-discovered functions,
                                making the algorithm O(N²) in the number of
                                functions.
                            </p>
                        </Section>

                        <Section title="Recommendations" icon="💡">
                            <div className="recommendation">
                                <h4>
                                    1. Batch function discovery{" "}
                                    <span className="badge badge-hot">
                                        high impact
                                    </span>
                                </h4>
                                <p>
                                    Instead of setting{" "}
                                    <code>definitely_changed</code> per
                                    function, collect all reachable embedded
                                    functions in a single breadth-first pass
                                    before entering the fixed-point loop. This
                                    could reduce iterations from ~15 to ~2–3 per
                                    kernel.
                                </p>
                            </div>

                            <div className="recommendation">
                                <h4>
                                    2. Share attr-type cache across instances{" "}
                                    <span className="badge badge-hot">
                                        high impact
                                    </span>
                                </h4>
                                <p>
                                    Change the cache key in{" "}
                                    <code>_compute_attr_type</code> from
                                    <code>
                                        (id(object_value), attr_name)
                                    </code>{" "}
                                    to
                                    <code>(type(object_value), attr_name)</code>
                                    . Most device instances of the same class
                                    expose identical attribute types. This would
                                    eliminate ~90% of slow-path calls.
                                </p>
                            </div>

                            <div className="recommendation">
                                <h4>
                                    3. Add fast paths for common types{" "}
                                    <span className="badge badge-warm">
                                        medium impact
                                    </span>
                                </h4>
                                <p>
                                    Currently only <code>list</code> of scalars
                                    has a fast path in
                                    <code>_compute_attr_type</code>. Adding fast
                                    paths for
                                    <code>numpy.ndarray</code>,{" "}
                                    <code>tuple</code>, <code>str</code>,
                                    <code>bytes</code>, and simple numeric types
                                    would bypass the quote+infer overhead
                                    entirely.
                                </p>
                            </div>

                            <div className="recommendation">
                                <h4>
                                    4. Skip unchanged functions during inference{" "}
                                    <span className="badge badge-cool">
                                        lower impact
                                    </span>
                                </h4>
                                <p>
                                    Track which functions' types changed in the
                                    previous iteration and only revisit those.
                                    The <code>TypedtreeHasher</code> already
                                    computes hashes — reuse this to invalidate
                                    only changed subtrees.
                                </p>
                            </div>
                        </Section>

                        <Section title="Raw Profile Data" icon="📊">
                            <p style={{ color: "#8b949e", fontSize: "0.9rem" }}>
                                Full cProfile output written to{" "}
                                <code>compile_profile.prof</code>. Load with:{" "}
                                <code>
                                    python -m pstats compile_profile.prof
                                </code>
                            </p>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Function (total time)</th>
                                        <th>Module</th>
                                        <th className="num">Total (s)</th>
                                        <th className="num">Calls</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {HOTSPOTS_TOTTIME.map((h, i) => (
                                        <tr key={i}>
                                            <td>
                                                <code>{h.func}</code>
                                            </td>
                                            <td>{h.file}</td>
                                            <td className="num">
                                                {h.time.toFixed(1)}
                                            </td>
                                            <td className="num">{h.calls}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </Section>

                        <p
                            style={{
                                textAlign: "center",
                                color: "#484f58",
                                fontSize: "0.8rem",
                                marginTop: "2rem",
                            }}
                        >
                            Report generated from cProfile data — ARTIQ compiler
                            vendored at <code>vendor/artiq/</code>
                        </p>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(<App />);
        </script>
    </body>
